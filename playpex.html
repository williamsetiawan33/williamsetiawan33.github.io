<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playpex</title>
    <style>
        body
        {
            margin: 0;   
            background-color: #181818;         
        }
        .header
        {
            position: fixed;
            left: 220px;
            background-color: #212121;
            width: 100%;
            height: 55px;
            opacity: 90%;
            border-bottom: 1px solid #373737;
        }
        .header .pencarian
        {
            position: absolute;
            height: 40px;
            top: 7.5px;
            left: 20%;
            border-radius: 7px;
            border: 1px solid #373737;
            width: 40%;
            background-color: #121212;
        }
        .header .akun
        {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: absolute;
            right: 225px;
            width: 270px;
            height: 55px;
            .background-color: rebeccapurple;
        }
        .header .akun .profile
        {            
            background-color: white;
            width: 40px;
            height: 40px;
            border-radius: 50px; 
            margin: 10px;           
        }
        .sidenav
        {
            position: fixed;
            left: 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;            
            background-color: #212121;
            width: 240px;
            height: 906px;
            overflow: scroll;
        }
        .sidenav .logosidenav
        {
            background-color: #212121;
            border: 1px solid #373737;
            border-radius: 15px;
            width: 240px;
            height: 55px;            
        }        
        .konten
        {              
            margin-left: 240px;       
            display: flex;
            justify-content:flex-start;
            flex-wrap: wrap;          
        }
        .konten .separator
        {
            margin: 10px;
            width: 100%;
            height: 1px;
            border-radius: 50%;
            background-color: #373737;
        }
        .konten img
        {
            margin: 10px;
            width: 253px;
            height: 142px;
            transition: transform 0.5s;
            transition-delay: 0.5s;
        }        
        .konten .promotion
        {
            margin-top: 55px;
            width: 100%;
            height: 200px;
            background-color: white;
        }   
        @media only screen and (orientation: landscape)
        {
            .konten img:hover
            {
            transform: scale(130%);
            }
        }
        @media only screen and (orientation: portrait) 
        {
            .header
            {
                left: 0;
            }
            .header .pencarian
        {
            position: absolute;
            height: 40px;
            top: 7.5px;
            left: 20%;
            border-radius: 7px;
            width: 60%;
            background-color: #121212;
        }
        .header .akun
        {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: absolute;
            right: 0;
            width: 270px;
            height: 55px;
            .background-color: rebeccapurple;
        }
        .header .akun .profile
        {            
            background-color: white;
            width: 40px;
            height: 40px;
            border-radius: 50px; 
            margin: 10px;           
        }
            .sidenav
            {
            display: none;
            }
            .konten
            {
                margin-left: 0px;
            }
            .konten img
            {
                width: 370px;
                height: 200px;
                margin-inline: 10px;
            }            
        }     
    </style>
</head>
