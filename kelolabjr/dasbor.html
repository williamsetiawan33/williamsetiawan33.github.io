<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dasbor.css">
    <title>Dasbor | Kelola Belajar</title>
</head>
<body>
    <!-- navbar-->
    <div class="navbar">
        <div class="navbarkiri">
            <div class="logo"></div>
            <p>KELOLA BELAJAR<br>Halo <span id="username">Nama Pengguna</span></p>
        </div>
        <div class="navbarkanan">
            <p>To do</p>            
            <p>Catatan</p>            
            <p>Buat jadwal</p>            
            <p style="margin-right: 15px;">Bantuan</p>          
        </div>
    </div>
    <!-- end navbar -->

    <!-- main container -->
    <div id="scpart1" class="dasbortittle">
        <p>Kelola belajarmu di sini</p>
        <!-- <div class="filterbg"></div> -->
    </div>
    <div class="main">          
        <div id="todocard" class="card" onclick="todo_open(); setTimeout(setdisplay1, 300);">
            <div class="cardimg">
                <img src="img/ic1.png" alt="">
            </div>
            <div class="cardtittle">
                <p>To do list</p>
            </div>
        </div>
        <div id="catatcard" class="card" onclick="catat_open(); setTimeout(setdisplay2, 300);">
            <div class="cardimg">
                <img id="imgcatat" src="img/ic2.png" alt="">
            </div>
            <div class="cardtittle">
                <p>Catatan</p>
            </div>
        </div>
        <div id="jadwalcard" class="card" onclick="jadwal_open(); setTimeout(setdisplay3, 300);">
            <div class="cardimg">
                <img id="imgjadwal" src="img/ic3.png" alt="">
            </div>
            <div class="cardtittle">
                <p>Jadwal pribadi</p>
            </div>
        </div>   
        <div class="banner">
            <p>LEBIH RAPI DENGAN KELOLA BELAJAR</p>
        </div>
        <div class="banner2">
            <p>"Ing ngarsa sung tuladha, Ing madya mangun karsa, Tut Wuri Handayani."<br><br>-Ki Hajar Dewantara-</p>
        </div>
    </div>
    <!-- end main container -->

    <!-- footer -->
    <div class="footer">
        <p>C Tim kelompok 6</p>
    </div>
    <!-- end footer -->
    <script>        
        var user = sessionStorage.getItem("username");
        var isTodo = 0;
        var isCatat = 0;
        var isJadwal = 0;
        var todo = document.getElementById("todocard");
        var catat = document.getElementById("catatcard");
        var jadwal = document.getElementById("jadwalcard");
        document.getElementById("username").innerHTML = user;                        
        function setdisplay1()
        {
            if(isTodo == 1)
            {
                catat.style.display = "none";            
                jadwal.style.display = "none";
                document.getElementById("scpart1").scrollIntoView(false);
            }           
            else if(isTodo == 0) 
            {
                catat.style.display = "block";            
                jadwal.style.display = "block";
                document.getElementById("scpart1").scrollIntoView(false);
            }            
        }
        function setdisplay2()
        {            
            if(isCatat == 1)
            {
                todo.style.display = "none";            
                jadwal.style.display = "none";   
                document.getElementById("scpart1").scrollIntoView(false);
            }           
            else if(isCatat == 0) 
            {
                todo.style.display = "block";            
                jadwal.style.display = "block";
                document.getElementById("scpart1").scrollIntoView(false);
            }                    
        }
        function setdisplay3()
        {            
            if(isJadwal == 1)
            {
                todo.style.display = "none";            
                catat.style.display = "none";
                document.getElementById("scpart1").scrollIntoView(false);
            }           
            else if(isJadwal == 0) 
            {
                todo.style.display = "block";            
                catat.style.display = "block";
                document.getElementById("scpart1").scrollIntoView(false);
            }
        }
        function todo_open()
        {            
            if(isTodo == 0)
            {                
                todo.style.width = "80%";
                catat.style.width = "0";
                jadwal.style.width = "0";
                isTodo = 1;
                isCatat = 0;
                isJadwal = 0;
            }            
            else if(isTodo == 1)
            {                
                todo.style.width = "220px";
                catat.style.width = "220px";
                jadwal.style.width = "220px";
                isTodo = 0;
                isCatat = 0;
                isJadwal = 0;                
            }
        }
        function catat_open()
        {            
            if(isCatat == 0)
            {
                todo.style.width = "0";
                catat.style.width = "80%";
                jadwal.style.width = "0";
                isTodo = 0;
                isCatat = 1;
                isJadwal = 0;
            }            
            else if(isCatat == 1)
            {
                todo.style.width = "220px";
                catat.style.width = "220px";
                jadwal.style.width = "220px";
                isTodo = 0;
                isCatat = 0;
                isJadwal = 0;
            }            
        }
        function jadwal_open()
        {            
            if(isJadwal == 0)
            {
                todo.style.width = "0";
                catat.style.width = "0";
                jadwal.style.width = "80%";
                isTodo = 0;
                isCatat = 0;
                isJadwal = 1;
            }            
            else if(isJadwal == 1)
            {
                todo.style.width = "220px";
                catat.style.width = "220px";
                jadwal.style.width = "220px";
                isTodo = 0;
                isCatat = 0;
                isJadwal = 0;
            }
        }                                      
    </script>
</body>
</html>
