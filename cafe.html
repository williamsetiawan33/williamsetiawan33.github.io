<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonjour!</title>
    <style>
        html
        {
            scroll-behavior: smooth;
        }
        body
        {
            background-color: rgb(218, 213, 211);
            margin: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        #topcover
        {
            width: 100%;
            height: 500px;
            background-image: url(img/cover.jpg);
            background-size: cover;
            background-position: 0 -400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }        
        #topcover #judul
        {
            color: white;
            background-color: rgb(88, 85, 85);
            padding: 10px;
            font-size: 100px;
            text-align: center;
        }
        #topcover #judul #desc
        {
            font-size: 50px;
        }        
        #navbar
        {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: rgb(88, 85, 85);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            align-content: flex-start;
            flex-wrap: wrap;
            transition: 0.5s;
        }   
        #navbar #btc1
        {
            display: none;
            justify-content: flex-end;
            width: 100%;
            /* background-color: red; */
        }
        #navbar #btc1 #btnmenu
        {
            width: 40px;
            height: 40px;
            background-color: #653623;
            border-radius: 10px;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            align-content: center;
            flex-wrap: wrap;
        }
        #navbar #btc1 #btnmenu #btndot
        {
            width: 70%;
            height: 3px;
            margin-block: 2px;
            background-color: white;
            border-radius: 50px;
        }
        #navbar p
        {
            /* background-color: red; */
            margin: 10px;
            font-size: 20px;
            color: white;
            text-align: center;
        }     
        #navbar p:hover
        {
            cursor: default;
            user-select: none;
            color: rgb(168, 168, 168);
        }
        #menutittle
        {
            display: flex;
            justify-content: space-evenly;
            align-items: flex-start;
            /* background-color: red; */
        }
        #menutittle p 
        {
            margin: 0;
            font-size: 20px;
            padding-top: 50px;
            /* background-color: purple; */
        }
        #menubar
        {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            /* height: 450px; */
            /* background-color: red; */
        }               
        #menubar .menucontainer
        {
            box-shadow: 0 4px 10px -3px rgb(88, 85, 85);
            margin: 20px;
            width: 300px;
            height: 370px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            /* background-color: #653623; */
            background-image: url(img/bg.jpg);
            background-size: cover;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.5s;
        } 
        #menubar .menucontainer:hover
        {
            transform: scale(110%);
        }
        #menubar .menucontainer p
        {
            width: 100%;
            /* background-color: purple; */
            color: rgb(255, 255, 255);
            text-align: center;
            font-size: 25px;
        }
        #menubar .menucontainer img
        {
            width: 300px;
            height: 300px;
        }    
        #contactbar
        {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            /* height: 450px; */
            /* background-color: rgb(0, 255, 136); */            
        }          
        #contactbar #iglogo
        {
            margin: 20px;
            width: 40px;
            height: 40px;
            transition: 0.5s;
        }  
        #contactbar #iglogo:hover
        {
            transform: scale(110%);
        }
        #contactbar #ytlogo
        {
            margin: 20px;
            width: 55px;
            height: 40px;
            transition: 0.5s;
        } 
        #contactbar #ytlogo:hover
        {
            transform: scale(110%);
        }
        #contactbar p
        {
            margin: 20px;
        }
        @media only screen and (orientation: portrait)
        {
            #topcover
            {
                height: 300px;
            }
            #navbar #btc1
            {
                position: sticky;
                display: flex;
            }
            #navbar
            {
                position: sticky;
                overflow: hidden;
                /* height: 330px; */
                height: 60px;
            }
            #navbar a
            {
                width: 100%;
            }      
            #topcover #judul
            {
                width: 200px;
                height: 100px;
                font-size: 40px;
            }      
            #topcover #judul #desc
            {               
                font-size: 25px;
            }     
            #menubar .menucontainer
            {
                width: 350px;
                height: 415px;
            } 
            #menubar .menucontainer img
            {
                width: 350px;
                height: 350px;
            }  
        }
    </style>
</head>
<body>
    <div id="topcover">
        <p style="background-image: url(img/bg.jpg); opacity: 75%;" id="judul">ChiChi<br><span id="desc">Coffe and Bakery</span></p>
    </div>    
    <script>        
        var y = 0;
        function expandnav()
        {                  
            var x = document.getElementById("navbar");
            if(y == 0)
            {
                x.style.height = ("330px");
                y = 1;
                console.log(y);
            }
            else
            {   
                x.style.height = ("60px");
                y = 0;
                console.log(y);
            }            
        }
        function closenav()
        {
            var x = document.getElementById("navbar");
            x.style.height = ("60px");
        }
    </script>
    <div id="navbar">  
        <div id="btc1">
            <div id="btnmenu" onclick="expandnav()">
                <div id="btndot"></div>
                <div id="btndot"></div>
                <div id="btndot"></div>
            </div>
        </div>
        <a href="cafe.html">
            <p id="home">Home</p>
        </a>        
        <a href="#topcover" onclick="closenav()">
            <p id="menu">Menu</p>
        </a>  
        <a href="#contactbar" onclick="closenav()">
            <p id="contact">Contact us</p>
        </a>      
        <a href="" onclick="closenav()">
            <p id="order">Order</p>
        </a>        
        <a href="" onclick="closenav()">
            <p id="career">Career</p>
        </a>        
    </div>
    <div id="menutittle">
        <p>Our menu</p>
    </div>
    <div id="menubar">
        <div class="menucontainer" id="menu1">
            <img src="img/latte2.jpg" alt="cappucino">
            <p>Coffe</p>
        </div>        
        <div class="menucontainer" id="menu2">
            <img src="img/toast.jpg" alt="toast">
            <p>Toast</p>
        </div>        
        <div class="menucontainer" id="menu3">
            <img src="img/french-fries-gf36ea6e8d_1920.jpg" alt="">
            <p>Snack</p>
        </div>                                        
        <div class="menucontainer" id="menu4">
            <img src="img/latte2.jpg" alt="cappucino">
            <p>Coffe</p>
        </div>        
        <div class="menucontainer" id="menu5">
            <img src="img/toast.jpg" alt="toast">
            <p>Toast</p>
        </div>        
        <div class="menucontainer"  id="menu6">
            <img src="img/french-fries-gf36ea6e8d_1920.jpg" alt="">
            <p>Snack</p>
        </div>           
    </div>   
    <div id="contactbar">
        <img id="iglogo" src="img/Instagram_logo_2016.svg" alt="">        
        <img id="ytlogo" src="img/YouTube_full-color_icon_(2017).svg" alt="">
        <p>Jl.Magelang Km 5 no 12</p>
    </div> 
</body>
</html>
