<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>William</title>
    <style>
        body
        {
            margin: 0;
        }
        .header
        {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1px;
            background: black;
            color: white;
        }
        .header p
        {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 70px;
        }
        .navbar
        {
            position: sticky;
        }
        .navbar ul
        {            
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content:center;
            align-items: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 30px;
        }
        .navbar li
        {
            margin: 10px;
            border: 2px solid black;
            border-radius: 10px;
            padding: 5px;
        }
        .main
        {
            margin: auto;
            background: rgb(218, 213, 213);
            width: 95%;
            height: 700px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="header"><p>William</p></div>
    <div class="navbar">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Other Links</li>
        </ul>
    </div>
    <div class="main"></div>
</body>
</html>
